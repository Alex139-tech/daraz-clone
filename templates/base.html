{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daraz Clone</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/slider.css' %}">
    <link rel="stylesheet" href="{% static 'css/product_list.css' %}">
    <link rel="stylesheet" href="{% static 'css/product_details.css' %}">
</head>

<body>

    <!-- Navbar -->
    <nav class="bg-daraz">
        <div class="container">

            <!-- Top Links -->
            <div class="d-flex justify-content-end flex-wrap gap-4 py-2">
                <a href="#" class="top-nav-link">SAVE MORE ON APP</a>
                <a href="#" class="top-nav-link">BECOME A SELLER</a>
                <a href="#" class="top-nav-link">HELP & SUPPORT</a>
                <a href="#" class="top-nav-link">LOGIN</a>
                <a href="#" class="top-nav-link">SIGN UP</a>
                <a href="#" class="top-nav-link">भाषा परिवर्तन</a>
            </div>

            <!-- Logo, Search, Cart -->
            <div class="row align-items-center g-3 pb-2">

                <!-- Logo -->
                <div class="col-lg-2 col-md-3 col-4">
                    <a href="/" class="navbar-brand m-0">
                        <img
                            src="{% static 'images/logo1.png' %}"
                            alt="Logo"
                            class="img-fluid logo-img">
                    </a>
                </div>

                <!-- Search -->
                <div class="col-lg-9 col-md-8 col-6 d-flex flex-column">
                    <div class="input-group">
                        <input
                            type="text"
                            class="form-control search-box"
                            placeholder="Search in Daraz">

                        <button class="search-btn">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>

                    {% block search_tags %}
                    {% endblock %}
                </div>

                <!-- Cart -->
                <div class="col-lg-1 col-md-1 col-2 text-end">
                    <i class="bi bi-cart2 cart-icon"></i>
                </div>

            </div>
        </div>
    </nav>

    <!-- Breadcrumb -->
    {% block breadcrumbs %}
    {% endblock %}

    <!-- Page Content -->
    <main class="main-body-content">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="{% static 'js/base.js' %}"></script>
    <script src="{% static 'js/slider.js' %}"></script>
    <script src="{% static 'js/product_details.js' %}"></script>
    <script src="{% static 'js/time.js' %}"></script>



</body>

</html>
