{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center align-items-center">

        <div class="col-lg-10">

            <div class="card border-0 shadow-lg overflow-hidden"
                 style="border-radius:20px;">

                <div class="row g-0">

                    <!-- Left Side -->

                    <div class="col-lg-5 d-none d-lg-flex flex-column justify-content-center text-white p-5"
                         style="background:linear-gradient(135deg,#f57224,#ff9f43);">

                        <h2 class="fw-bold mb-3">
                            Welcome Back!
                        </h2>

                        <p class="mb-4" style="line-height:1.8;">
                            Login to continue shopping on our Daraz Clone.
                            Track your orders, manage your cart and enjoy
                            exclusive deals.
                        </p>

                        <div class="text-center mt-4">

                            <i class="bi bi-person-circle"
                               style="font-size:130px;opacity:.9;"></i>

                        </div>

                    </div>

                    <!-- Right Side -->

                    <div class="col-lg-7 bg-white">

                        <div class="p-5">

                            <h2 class="fw-bold text-center mb-4"
                                style="color:#f57224;">

                                Login Account

                            </h2>

                            <form method="POST">

                                {% csrf_token %}

                                <div class="mb-4">

                                    <label class="form-label fw-semibold">
                                        Username
                                    </label>

                                    <div class="input-group">

                                        <span class="input-group-text"
                                              style="background:#f57224;color:white;border:none;">

                                            <i class="bi bi-person-fill"></i>

                                        </span>

                                        <input
                                            type="text"
                                            name="username"
                                            class="form-control"
                                            placeholder="Enter Username"
                                            required
                                            style="height:50px;">

                                    </div>

                                </div>

                                <div class="mb-4">

                                    <label class="form-label fw-semibold">
                                        Password
                                    </label>

                                    <div class="input-group">

                                        <span class="input-group-text"
                                              style="background:#3498db;color:white;border:none;">

                                            <i class="bi bi-lock-fill"></i>

                                        </span>

                                        <input
                                            type="password"
                                            name="password"
                                            class="form-control"
                                            placeholder="Enter Password"
                                            required
                                            style="height:50px;">

                                    </div>

                                </div>

                                <div class="d-flex justify-content-between align-items-center mb-4">

                                    <div class="form-check">

                                        <input class="form-check-input"
                                               type="checkbox"
                                               id="remember">

                                        <label class="form-check-label"
                                               for="remember">

                                            Remember Me

                                        </label>

                                    </div>

                                    <a href="#"
                                       class="text-decoration-none"
                                       style="color:#3498db;">

                                        Forgot Password?

                                    </a>

                                </div>

                                <button
                                    type="submit"
                                    class="btn w-100 text-white fw-bold"
                                    style="height:50px;
                                           background:linear-gradient(90deg,#f57224,#ff9f43);
                                           border:none;
                                           border-radius:10px;">

                                    Login

                                </button>

                            </form>

                            <hr class="my-4">

                            <div class="text-center">

                                <span class="text-secondary">
                                    Don't have an account?
                                </span>

                                <a href="{% url 'register' %}"
                                   class="fw-bold text-decoration-none"
                                   style="color:#f57224;">

                                    Register Now

                                </a>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
