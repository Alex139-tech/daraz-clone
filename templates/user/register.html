{% extends "base.html" %} 

{% block content %} 

<div class="container d-flex justify-content-center align-items-center py-5"
     style="min-height:50vh;">

    <div class="row justify-content-center w-100 h-80vh">

        <div class="col-lg-9">

            <div class="card border-0 shadow-lg overflow-hidden"
                 style="border-radius:25px;">

                <div class="row g-0">

                    <!-- Left Side -->

                    <div class="col-lg-5 d-none d-lg-flex flex-column justify-content-center align-items-center text-white p-5"
                         style="background:linear-gradient(160deg,#f57224,#ff9f43,#3498db);">

                        <div class="text-center">

                            <i class="bi bi-person-circle"
                               style="font-size:90px;"></i>

                            <h2 class="fw-bold mt-4">
                                Welcome!
                            </h2>

                            <p class="mt-3 opacity-75">
                                Create your account and enjoy
                                exclusive deals, secure checkout,
                                fast delivery and much more.
                            </p>

                        </div>

                    </div>

                    <!-- Right Side -->

                    <div class="col-lg-7 bg-white">

                        <div class="p-5">

                            <div class="text-center mb-4">

                                <h2 class="fw-bold">

                                    Create
                                    <span style="color:#f57224;">
                                        Account
                                    </span>

                                </h2>

                                <p class="text-secondary">

                                    Start shopping in less than a minute.

                                </p>

                            </div>

                            <form method="POST"
                                  enctype="multipart/form-data">

                                {% csrf_token %}

                                {{ form.as_p }}

                                <button
                                    class="btn w-100 text-white fw-bold mt-3"
                                    style="
                                    height:52px;
                                    border:none;
                                    border-radius:12px;
                                    background:linear-gradient(90deg,#f57224,#ff9f43);
                                    transition:.3s;
                                    ">

                                    <i class="bi bi-person-plus-fill me-2"></i>

                                    Create Account

                                </button>

                            </form>

                            <div class="text-center my-4">

                                <span class="text-muted">

                                    OR

                                </span>

                            </div>

                            <div class="d-grid gap-2">

                                <button class="btn btn-outline-dark">

                                    <i class="bi bi-google me-2"></i>

                                    Continue with Google

                                </button>

                                <button class="btn btn-outline-primary">

                                    <i class="bi bi-facebook me-2"></i>

                                    Continue with Facebook

                                </button>

                            </div>

                            <hr class="my-4">

                            <div class="text-center">

                                Already have an account?

                                <a href="{% url 'login' %}"
                                   class="fw-bold text-decoration-none"
                                   style="color:#f57224;">

                                    Login

                                </a>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>


{% endblock %}
