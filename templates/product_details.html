{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row">

        <div class="col-md-5">
            <img src="{{ product.image.url }}"
                 class="img-fluid"
                 alt="{{ product.title }}">
        </div>

        <div class="col-md-7">
            <h2>{{ product.title }}</h2>
            <h3 class="text-warning">
                Rs. {{ product.current_price }}
            </h3>

            <p>{{ product.description }}</p>

            <button class="btn btn-warning">
                Add to Cart
            </button>
        </div>

    </div>
</div>
{% endblock %}
